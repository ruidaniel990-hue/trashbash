databases:
  - name: trashbash-db
    plan: free
    databaseName: trashbash
    user: trashbash

services:
  - type: web
    name: trashbash-api
    plan: free
    runtime: node
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trashbash-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
